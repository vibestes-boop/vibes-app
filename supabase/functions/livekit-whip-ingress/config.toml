[functions.livekit-whip-ingress]
# Supabase Gateway JWT-Verification abschalten.
# Grund: Neue Supabase-Projekte signieren User-JWTs mit ES256 (asymmetric).
# Die Edge-Runtime Gate-Validierung unterstützt das (noch) nicht.
# Die Function verifiziert den JWT selbst via /auth/v1/user (unterstützt ES256).
verify_jwt = false
