# -----------------------------------------------------------------------------
# Test-Workflow: Native (Expo-Root) + Web (apps/web).
#
# Beide Hälften des Monorepos haben EIGENE package.json + lock + node_modules +
# Jest-Config und müssen darum getrennt installiert + getestet werden. Matrix
# wäre überkandidelt, da Expo-Root einen schwereren Install (LiveKit + Skia
# Prebuilds) hat als Web — separate Jobs erlauben unterschiedliche Caches und
# klarere Fail-Signale in der PR-UI.
#
# Node 24 LTS: GitHub Actions stellt JavaScript-Actions schrittweise auf Node 24
# um; wir pinnen explizit statt "latest", damit CI reproduzierbar bleibt und
# Future-Runner-Drift frueh sichtbar wird.
#
# Ausgelöst auf push + PR zu main — so läuft es für Branch-Pushes (früh-Signal
# während Dev) UND auf PRs (merge-Gate). Workflow-Dispatch erlaubt manuelle
# Reruns.
# -----------------------------------------------------------------------------

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel redundant runs auf derselben ref (z.B. force-push) — spart CI-Minuten.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into GitHub's Node 24 JavaScript-action runtime before it becomes the
  # default, so checkout/setup-node/upload-artifact warnings become hard signal.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # Native (Expo / React Native) — läuft in Repo-Root.
  # Testet: lib/__tests__/**/*.test.{ts,tsx} via jest-expo.
  # ---------------------------------------------------------------------------
  native:
    name: native (expo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (root)
        # npm ci benutzt lock + node_modules-sauberes Install. --no-audit weil
        # Audit bereits auf dev-Maschine + Dependabot läuft. patch-package wird
        # via postinstall ausgeführt.
        run: npm ci --no-audit --no-fund

      - name: Test (jest-expo) + coverage
        # --coverage schreibt nach coverage/ und enforced jest.config.js
        # coverageThreshold — bricht hier wenn global-Floor oder eins der
        # per-file-Gates (liveModerationWords / gifts) unterschritten wird.
        run: npm test -- --ci --colors --coverage

      - name: Upload coverage (native)
        # Nur auf Push zu main + PRs; lokale Dispatch-Runs brauchen kein
        # Artifact. Retention 7 Tage reicht für Post-Mortem-Debugging.
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-native
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Web (Next.js / Serlo) — läuft in apps/web.
  # Testet: hooks/__tests__ + components/**/__tests__ + lib/** via next/jest.
  # ---------------------------------------------------------------------------
  web:
    name: web (next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install (apps/web)
        run: npm ci --no-audit --no-fund

      - name: Test (next/jest) + coverage
        # next/jest verlangt ggf. SWC-Binary — Setup-Node cached npm, aber
        # SWC lädt ggf. nach. In GitHub-Actions-Runnern (Ubuntu x64) ist das
        # unproblematisch; im Gegensatz zu Sandboxes mit Egress-Restrictions.
        #
        # --coverage enforced apps/web/jest.config.js coverageThreshold —
        # bricht hier wenn global-Floor oder die per-file-Gates (use-engagement,
        # feed.ts, feed-list.tsx) unterschritten werden.
        run: npm test -- --ci --colors --coverage

      - name: Upload coverage (web)
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 7
          if-no-files-found: warn
