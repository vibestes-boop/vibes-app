# -----------------------------------------------------------------------------
# Playwright-Smoke: echte Browser-Pruefung der wichtigsten Web-Pfade.
#
# Läuft bewusst gegen Production, weil dafür keine GitHub-Secrets nötig sind und
# wir damit CORS/CDN/Auth-Redirects in der Umgebung sehen, in der Nutzer wirklich
# landen. Lokal testet `npm run test:e2e` dagegen den aktuellen Branch über einen
# automatisch gestarteten Next-Dev-Server.
# -----------------------------------------------------------------------------

name: e2e-smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: '43 6,18 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  web-production:
    name: web production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    env:
      E2E_BASE_URL: https://serlo-web.vercel.app
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install (apps/web)
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e -- --project=chromium-mobile

      - name: Upload Playwright report
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
