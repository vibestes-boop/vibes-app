# -----------------------------------------------------------------------------
# Typecheck-Workflow: tsc --noEmit gegen apps/web.
#
# Zweck: TS-Sauberkeit (heute auf 0 Errors gebracht) gegen schleichende
# Regressionen schützen. Niemand läuft `tsc --noEmit` lokal manuell vor jedem
# Push — CI muss das übernehmen.
#
# Bewusst eigenes File (statt Step in test.yml): läuft parallel zu Jest, eigener
# Check-Eintrag in der PR-UI ("typecheck / web"), schneller-failing wenn TS
# broken ist (kein Warten auf Coverage-Run). Cache-Hit auf npm-Deps macht den
# zusätzlichen Install günstig.
#
# Trigger identisch zu test.yml — push+PR gegen main + workflow_dispatch für
# manuelle Reruns.
# -----------------------------------------------------------------------------

name: typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into GitHub's Node 24 JavaScript-action runtime before it becomes the
  # default, so checkout/setup-node warnings turn into real compatibility tests.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  web:
    name: web (next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install (apps/web)
        # npm ci nutzt lock + saubere node_modules. --no-audit/--no-fund für
        # weniger CI-Noise; Audits laufen bereits über Dependabot.
        run: npm ci --no-audit --no-fund

      - name: Type check
        # Script in apps/web/package.json:  "typecheck": "tsc --noEmit"
        # tsc beendet mit Exit 1 bei TS-Errors; npm run reicht den Exit-Code
        # 1:1 durch → Job rot, PR-Gate blockt.
        run: npm run typecheck
