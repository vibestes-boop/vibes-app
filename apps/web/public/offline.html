<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050508">
  <title>Offline — Serlo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #050508;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, #F59E0B, #F43F5E, #D946EF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 32px;
      color: white;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 8px;
    }
    p {
      max-width: 360px;
      color: #a3a3a3;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 24px;
    }
    button {
      appearance: none;
      border: 1px solid #262626;
      background: #141418;
      color: #e5e5e5;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    button:hover { border-color: #525252; }
  </style>
</head>
<body>
  <div class="logo">S</div>
  <h1>Du bist offline</h1>
  <p>
    Keine Internetverbindung. Sobald du wieder online bist, ziehst du den Feed
    einfach nach unten zum Aktualisieren oder klickst hier:
  </p>
  <button type="button" onclick="location.reload()">Erneut versuchen</button>
</body>
</html>
